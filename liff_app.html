<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辦公室點餐助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-800">

    <!-- 頂部精美 Banner -->
    <div class="gradient-bg text-white px-6 pt-8 pb-16 rounded-b-[2.5rem] shadow-lg relative">
        <div class="flex items-center justify-between">
            <div>
                <span class="text-xs text-indigo-300 font-bold uppercase tracking-wider">SentryPay 系統</span>
                <h1 class="text-2xl font-black tracking-tight mt-0.5">🍔 辦公室點餐助手</h1>
            </div>
            <div id="userAvatarContainer" class="relative">
                <!-- 大頭貼骨架屏 -->
                <div id="avatarPlaceholder" class="w-12 h-12 rounded-full bg-slate-700 animate-pulse"></div>
                <img id="userAvatar" class="w-12 h-12 rounded-full border-2 border-emerald-400 hidden shadow-md" src="" alt="User Avatar">
                <span class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-slate-900 rounded-full"></span>
            </div>
        </div>
        
        <!-- 當前使用者卡片 -->
        <div class="absolute -bottom-8 left-6 right-6 bg-white text-slate-800 p-4 rounded-2xl shadow-xl border border-slate-100 flex items-center justify-between">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase">當前點餐人</p>
                <h2 id="userName" class="text-base font-bold text-slate-800 mt-0.5">載入 LINE 身分中...</h2>
            </div>
            <span class="bg-indigo-50 text-indigo-700 text-[10px] font-bold px-2.5 py-1 rounded-full flex items-center">
                <i class="fas fa-shield-alt mr-1"></i> 免登入已安全保護
            </span>
        </div>
    </div>

    <!-- 主要內容區 -->
    <main class="px-6 mt-14 space-y-6">

        <!-- 狀態提示：載入中 -->
        <div id="loadingStatus" class="bg-white p-8 rounded-3xl text-center border border-slate-100 shadow-sm">
            <div class="inline-block animate-spin rounded-full h-8 text-indigo-600 border-4 border-solid border-current border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]" role="status"></div>
            <p class="text-xs text-slate-400 font-bold mt-3">正在與 Google 雲端安全連線中...</p>
        </div>

        <!-- 店家與菜單卡片區 -->
        <div id="menuContainer" class="hidden space-y-6">
            <!-- 這裡會由 JS 動態生成多個店家的選單卡片 -->
        </div>

        <!-- 自訂品項/金額（折疊卡片） -->
        <div id="customItemCard" class="hidden bg-white rounded-3xl p-5 border border-slate-100 shadow-sm">
            <button onclick="toggleCustomItem()" class="w-full flex items-center justify-between text-left">
                <div class="flex items-center space-x-2">
                    <div class="bg-amber-50 text-amber-600 w-8 h-8 rounded-xl flex items-center justify-center text-xs">
                        <i class="fas fa-plus-circle"></i>
                    </div>
                    <div>
                        <h3 class="text-xs font-bold text-slate-700">想點菜單上沒有的東西？</h3>
                        <p class="text-[10px] text-slate-400">點此展開填寫自訂品項與金額</p>
                    </div>
                </div>
                <i id="customArrow" class="fas fa-chevron-down text-slate-400 text-xs transition-transform duration-200"></i>
            </button>
            
            <div id="customFields" class="hidden mt-4 pt-4 border-t border-slate-100 space-y-3">
                <div>
                    <label class="text-[10px] text-slate-400 font-bold block mb-1">自訂品項名稱</label>
                    <input type="text" id="customName" placeholder="例如：香雞排、大杯紅茶" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold block mb-1">自訂金額 (NT$)</label>
                    <input type="number" id="customPrice" placeholder="例如：85" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs text-right focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
            </div>
        </div>

        <!-- 🛠️ 開發者診斷面板 (預設隱藏，出錯時才會顯示) -->
        <div id="diagnosticPanel" class="hidden bg-rose-50 border border-rose-100 rounded-3xl p-5 space-y-3">
            <div class="flex items-center space-x-2 text-rose-700">
                <i class="fas fa-exclamation-triangle"></i>
                <h3 class="text-xs font-black">🛠️ 開發者診斷回報</h3>
            </div>
            <p class="text-[11px] text-rose-600 leading-relaxed">
                系統與 Google 試算表通訊失敗。請檢查您的網頁代碼中的 <b>GAS_WEB_APP_URL</b> 是否為以 <code>/exec</code> 結尾的正式網址，並確認 GAS 部署時的存取權限是否設為「所有人 (Anyone)」。
            </p>
            <div class="bg-rose-950 text-rose-100 rounded-xl p-3 text-[9px] font-mono overflow-x-auto space-y-1">
                <p><b>[嘗試連線的 API 網址]</b></p>
                <p id="diagUrl" class="break-all text-amber-300"></p>
                <p class="pt-2"><b>[瀏覽器錯誤日誌]</b></p>
                <p id="diagError" class="break-all text-rose-300"></p>
            </div>
        </div>

    </main>

    <!-- 底部固定結帳懸浮列 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 py-4 flex items-center justify-between z-40 shadow-[0_-8px_30px_rgb(0,0,0,0.04)]">
        <div>
            <p class="text-[10px] text-slate-400 font-bold uppercase">今日點餐總計</p>
            <p class="text-2xl font-black text-slate-900 mt-0.5" id="totalPriceDisplay">NT$ 0</p>
        </div>
        <button onclick="submitOrder()" id="btnSubmit" disabled class="bg-slate-300 text-slate-500 font-bold px-6 py-3.5 rounded-2xl text-xs transition-all shadow-md flex items-center space-x-1.5 cursor-not-allowed">
            <i class="fas fa-paper-plane"></i>
            <span>確認送出訂單</span>
        </button>
    </div>

    <!-- 成功與失敗的提示通知 (Toast) -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-2xl text-xs font-bold text-white shadow-xl transition-all duration-300 transform translate-y-[-100px] opacity-0 z-50 flex items-center space-x-2">
        <i id="toastIcon" class="fas"></i>
        <span id="toastText">訊息</span>
    </div>

    <script>
        // ==================== 【開發者參數設定區】 ====================
        const LIFF_ID = "2010150112-ejdkGN7h"; // 例如 "2001234567-abcde"
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygmumhGW6KaWj1Jbc7ZSo8IeKxrdyPcJWpJKeALvFZEqo_McMxYpzJbP6kbO81Q3eV/exec"; // 必須是 /exec 結尾的正式網址！

        // ==================== 【全域狀態變數】 ====================
        let currentUserName = "測試同事";
        let currentUserAvatar = "";
        let menuData = [];
        let selectedItems = {}; // 紀錄選中的品項 { "品項名稱": 單價 }
        let isCustomOpen = false;

        // 初始化
        window.onload = function() {
            initLIFF();
        };

        // LINE LIFF 初始化與登入狀態檢查
        function initLIFF() {
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login(); // 沒登入則引導登入
                    } else {
                        // 取得使用者 LINE 大頭貼與暱稱
                        liff.getProfile()
                            .then(profile => {
                                currentUserName = profile.displayName;
                                currentUserAvatar = profile.pictureUrl;
                                
                                // 渲染個人資料 UI
                                document.getElementById('userName').innerText = currentUserName;
                                if (currentUserAvatar) {
                                    const avatarImg = document.getElementById('userAvatar');
                                    avatarImg.src = currentUserAvatar;
                                    avatarImg.classList.remove('hidden');
                                    document.getElementById('avatarPlaceholder').classList.add('hidden');
                                }
                                
                                // 開始讀取試算表中的店家選單
                                fetchMenuData();
                            })
                            .catch(err => {
                                console.error('取得 LINE Profile 失敗:', err);
                                showDiagnostic("LINE Profile Error", err.toString());
                                fetchMenuData(); // 即使失敗仍載入選單（預設為測試帳號）
                            });
                    }
                })
                .catch(err => {
                    console.error('LIFF 初始化失敗:', err);
                    showDiagnostic("LIFF Init Error", err.toString());
                    // 處於外置瀏覽器測試環境
                    document.getElementById('userName').innerText = "本地測試同事 (開發中)";
                    fetchMenuData();
                });
        }

        // 從 Google 試算表讀取菜單選單 (doGet)
        function fetchMenuData() {
            const fetchUrl = `${GAS_WEB_APP_URL}?method=getVendors`;
            
            fetch(fetchUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP 錯誤碼: ${response.status}`);
                    }
                    return response.json();
                })
                .then(json => {
                    // 對齊新版 GAS 格式：{ status: "success", data: [...] }
                    if (json && json.status === "success" && Array.isArray(json.data)) {
                        menuData = json.data;
                        renderMenu(menuData);
                        
                        // 關閉 Loading 畫面，打開菜單與自訂欄位
                        document.getElementById('loadingStatus').classList.add('hidden');
                        document.getElementById('menuContainer').classList.remove('hidden');
                        document.getElementById('customItemCard').classList.remove('hidden');
                    } else {
                        throw new Error(json.message || "讀取到的資料格式不正確，找不到 status === 'success'");
                    }
                })
                .catch(err => {
                    console.error('API 呼叫失敗:', err);
                    document.getElementById('loadingStatus').innerHTML = `
                        <div class="text-rose-500 text-3xl mb-2"><i class="fas fa-times-circle"></i></div>
                        <p class="text-xs text-rose-500 font-bold">連線失敗，請檢查下方診斷報告</p>
                    `;
                    showDiagnostic(fetchUrl, err.toString());
                });
        }

        // 動態渲染選單
        function renderMenu(data) {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            // 1. 將資料依「店家名稱」進行分組
            const grouped = {};
            data.forEach(item => {
                if (!grouped[item.vendor]) {
                    grouped[item.vendor] = [];
                }
                grouped[item.vendor].push(item);
            });

            // 2. 針對每家店家渲染一張卡片
            Object.keys(grouped).forEach(vendorName => {
                const vendorCard = document.createElement('div');
                vendorCard.className = "bg-white rounded-3xl p-5 border border-slate-100 shadow-sm space-y-3";
                
                // 店家頭部標題
                let vendorIcon = vendorName.includes('咖啡') || vendorName.includes('星巴克') ? 'fa-coffee text-amber-700 bg-amber-50' : 'fa-utensils text-emerald-600 bg-emerald-50';
                vendorCard.innerHTML = `
                    <div class="flex items-center space-x-2.5 pb-2 border-b border-slate-50">
                        <div class="${vendorIcon} w-9 h-9 rounded-2xl flex items-center justify-center text-sm"></div>
                        <h3 class="text-sm font-bold text-slate-800">${vendorName}</h3>
                    </div>
                    <div class="space-y-2" id="items-${vendorName.replace(/\s+/g, '')}"></div>
                `;
                
                container.appendChild(vendorCard);
                const itemsContainer = document.getElementById(`items-${vendorName.replace(/\s+/g, '')}`);

                // 3. 渲染該店家的所有品項
                grouped[vendorName].forEach(p => {
                    const itemRow = document.createElement('label');
                    itemRow.className = "flex items-center justify-between bg-slate-50/50 hover:bg-slate-50 active:scale-[0.98] px-3.5 py-3 rounded-2xl cursor-pointer border border-slate-100 transition-all";
                    itemRow.innerHTML = `
                        <div class="flex items-center space-x-3">
                            <input type="checkbox" name="foodItem" value="${p.item}" data-price="${p.price}" onchange="handleItemSelect(this)" class="w-5 h-5 rounded-lg text-emerald-600 border-slate-200 focus:ring-0 focus:ring-offset-0 cursor-pointer">
                            <span class="text-xs font-bold text-slate-700">${p.item}</span>
                        </div>
                        <span class="text-xs font-black text-slate-900">NT$ ${p.price}</span>
                    `;
                    itemsContainer.appendChild(itemRow);
                });
            });
        }

        // 自訂品項/金額折疊切換
        function toggleCustomItem() {
            isCustomOpen = !isCustomOpen;
            const fields = document.getElementById('customFields');
            const arrow = document.getElementById('customArrow');
            
            if (isCustomOpen) {
                fields.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
                // 綁定輸入監聽事件，當使用者手動打字時，也能即時更新總計
                document.getElementById('customName').addEventListener('input', calculateTotal);
                document.getElementById('customPrice').addEventListener('input', calculateTotal);
            } else {
                fields.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
                calculateTotal(); // 重新計算總計
            }
        }

        // 當勾選/取消品項時觸發
        function handleItemSelect(checkbox) {
            const itemName = checkbox.value;
            const itemPrice = parseInt(checkbox.getAttribute('data-price'), 10);

            if (checkbox.checked) {
                selectedItems[itemName] = itemPrice;
                // 視覺效果：加上選取高亮外框
                checkbox.closest('label').classList.add('border-emerald-500', 'bg-emerald-50/20');
            } else {
                delete selectedItems[itemName];
                checkbox.closest('label').classList.remove('border-emerald-500', 'bg-emerald-50/20');
            }
            calculateTotal();
        }

        // 計算選餐總金額
        function calculateTotal() {
            let total = 0;

            // 1. 累加勾選的品項金額
            Object.keys(selectedItems).forEach(key => {
                total += selectedItems[key];
            });

            // 2. 累加自訂品項金額（若折疊選單是打開的且有填寫金額）
            if (isCustomOpen) {
                const cName = document.getElementById('customName').value.trim();
                const cPrice = parseInt(document.getElementById('customPrice').value, 10);
                if (cName && cPrice > 0) {
                    total += cPrice;
                }
            }

            // 3. 更新介面金額顯示
            document.getElementById('totalPriceDisplay').innerText = `NT$ ${total}`;

            // 4. 控制「送出訂單」按鈕的啟用狀態
            const btn = document.getElementById('btnSubmit');
            if (total > 0) {
                btn.disabled = false;
                btn.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-3.5 rounded-2xl text-xs transition-all shadow-md active:scale-95 flex items-center space-x-1.5 cursor-pointer";
            } else {
                btn.disabled = true;
                btn.className = "bg-slate-300 text-slate-500 font-bold px-6 py-3.5 rounded-2xl text-xs transition-all shadow-md flex items-center space-x-1.5 cursor-not-allowed";
            }
        }

        // 送出點餐至 Google 試算表 (submitOrder)
        function submitOrder() {
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> <span>正在傳送資料...</span>`;

            // 1. 統整點餐項目與金額
            let itemsList = [];
            let totalAmount = 0;

            // 勾選部分
            Object.keys(selectedItems).forEach(key => {
                itemsList.push(key);
                totalAmount += selectedItems[key];
            });

            // 自訂部分
            if (isCustomOpen) {
                const cName = document.getElementById('customName').value.trim();
                const cPrice = parseInt(document.getElementById('customPrice').value, 10);
                if (cName && cPrice > 0) {
                    itemsList.push(`${cName}(自訂)`);
                    totalAmount += cPrice;
                }
            }

            const finalItemString = itemsList.join(' + ');

            // 2. 構造 GET 請求參數
            const submitUrl = `${GAS_WEB_APP_URL}?method=submitOrder&name=${encodeURIComponent(currentUserName)}&item=${encodeURIComponent(finalItemString)}&amount=${totalAmount}`;

            fetch(submitUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP 錯誤碼: ${response.status}`);
                    }
                    return response.json();
                })
                .then(json => {
                    if (json && json.status === "success") {
                        showToast("🎉 點餐已成功登錄！請回到聊天室對帳", "success");
                        // 1.5 秒後自動關閉 LIFF 網頁
                        setTimeout(() => {
                            liff.closeWindow();
                        }, 1500);
                    } else {
                        throw new Error(json.message || "寫入資料失敗");
                    }
                })
                .catch(err => {
                    console.error('送出點單失敗:', err);
                    showToast("😢 點單傳送失敗，請通知開發者", "error");
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-paper-plane"></i> <span>確認送出訂單</span>`;
                    showDiagnostic(submitUrl, err.toString());
                });
        }

        // 輔助函式：顯示錯誤診斷面板
        function showDiagnostic(url, errorMsg) {
            document.getElementById('diagUrl').innerText = url;
            document.getElementById('diagError').innerText = errorMsg;
            document.getElementById('diagnosticPanel').classList.remove('hidden');
        }

        // 輔助函式：自製 Toast 輕量通知
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastText');

            text.innerText = message;
            if (type === "success") {
                toast.className = "fixed top-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-2xl text-xs font-bold text-white shadow-xl bg-emerald-600 flex items-center space-x-2 transition-all duration-300 z-50 opacity-100 translate-y-0";
                icon.className = "fas fa-check-circle";
            } else {
                toast.className = "fixed top-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-2xl text-xs font-bold text-white shadow-xl bg-rose-600 flex items-center space-x-2 transition-all duration-300 z-50 opacity-100 translate-y-0";
                icon.className = "fas fa-times-circle";
            }

            // 3 秒後自動隱藏
            setTimeout(() => {
                toast.className = "fixed top-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-2xl text-xs font-bold text-white shadow-xl transition-all duration-300 transform translate-y-[-100px] opacity-0 z-50 flex items-center space-x-2";
            }, 3000);
        }
    </script>
</body>
</html>
